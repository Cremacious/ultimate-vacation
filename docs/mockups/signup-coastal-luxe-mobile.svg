<svg width="540" height="1100" viewBox="0 0 540 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgm" x1="90" y1="32" x2="460" y2="1044" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F0E2"/>
      <stop offset="0.52" stop-color="#DAE8F2"/>
      <stop offset="1" stop-color="#F3E4D3"/>
    </linearGradient>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 136) rotate(35) scale(220 130)">
      <stop stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="540" height="1100" fill="url(#bgm)"/>
  <rect width="540" height="1100" fill="url(#g1)"/>

  <text x="48" y="84" fill="#51606E" font-family="Arial, sans-serif" font-size="16" letter-spacing="4">ULTIMATE VACATION</text>

  <text x="48" y="154" fill="#0F172A" font-family="Arial, sans-serif" font-size="42" font-weight="700">Plan the trip.</text>
  <text x="48" y="202" fill="#0F172A" font-family="Arial, sans-serif" font-size="42" font-weight="700">Skip the drama.</text>
  <text x="48" y="250" fill="#5E6D7B" font-family="Arial, sans-serif" font-size="21">Create your account and start</text>
  <text x="48" y="280" fill="#5E6D7B" font-family="Arial, sans-serif" font-size="21">organizing the vacation properly.</text>

  <rect x="36" y="334" width="468" height="590" rx="34" fill="#FFFFFF" fill-opacity="0.72" stroke="#FFFFFF" stroke-opacity="0.76"/>

  <text x="72" y="402" fill="#4E5F72" font-family="Arial, sans-serif" font-size="16" letter-spacing="3">CREATE ACCOUNT</text>
  <text x="72" y="448" fill="#0F172A" font-family="Arial, sans-serif" font-size="34" font-weight="700">The trip command</text>
  <text x="72" y="488" fill="#0F172A" font-family="Arial, sans-serif" font-size="34" font-weight="700">center starts here.</text>

  <text x="72" y="552" fill="#566577" font-family="Arial, sans-serif" font-size="16">Full name</text>
  <rect x="72" y="568" width="396" height="56" rx="18" fill="#F9FBFC" stroke="#D8E5EC"/>

  <text x="72" y="656" fill="#566577" font-family="Arial, sans-serif" font-size="16">Email</text>
  <rect x="72" y="672" width="396" height="56" rx="18" fill="#F9FBFC" stroke="#D8E5EC"/>

  <text x="72" y="760" fill="#566577" font-family="Arial, sans-serif" font-size="16">Password</text>
  <rect x="72" y="776" width="396" height="56" rx="18" fill="#F9FBFC" stroke="#D8E5EC"/>

  <rect x="72" y="860" width="396" height="58" rx="20" fill="#0F172A"/>
  <text x="198" y="897" fill="white" font-family="Arial, sans-serif" font-size="19" font-weight="700">Create account</text>

  <text x="175" y="962" fill="#687788" font-family="Arial, sans-serif" font-size="15">Already have an account? Log in</text>

  <rect x="72" y="1000" width="216" height="62" rx="22" fill="#14314B" fill-opacity="0.92"/>
  <text x="96" y="1026" fill="#9ED1E3" font-family="Arial, sans-serif" font-size="12" letter-spacing="2">TRIP PREVIEW</text>
  <text x="96" y="1054" fill="white" font-family="Arial, sans-serif" font-size="23" font-weight="700">Tulum escape</text>
  <text x="96" y="1078" fill="#D9E7EE" font-family="Arial, sans-serif" font-size="14">12 days out</text>
</svg>
