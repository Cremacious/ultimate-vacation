<svg width="540" height="1100" viewBox="0 0 540 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgm" x1="72" y1="30" x2="470" y2="1060" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0D8"/>
      <stop offset="0.5" stop-color="#D1EFFF"/>
      <stop offset="1" stop-color="#FFD7C3"/>
    </linearGradient>
