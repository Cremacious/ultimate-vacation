  <text x="42" y="242" fill="#5B6C79" font-family="Arial, sans-serif" font-size="20">Start your account and run the trip</text>
  <text x="42" y="270" fill="#5B6C79" font-family="Arial, sans-serif" font-size="20">like somebody finally made you a proper tool.</text>

  <rect x="34" y="328" width="472" height="624" rx="34" fill="#FFF8F0" stroke="#FFFFFF" stroke-opacity="0.82"/>
  <rect x="66" y="360" width="130" height="34" rx="17" fill="#FFE1D3"/>
  <text x="89" y="382" fill="#A24A2D" font-family="Arial, sans-serif" font-size="14" font-weight="700">FREE TO START</text>

  <text x="66" y="438" fill="#112131" font-family="Arial, sans-serif" font-size="34" font-weight="700">Make it official.</text>
  <text x="66" y="476" fill="#112131" font-family="Arial, sans-serif" font-size="34" font-weight="700">Be the trip boss.</text>

  <text x="66" y="548" fill="#596B79" font-family="Arial, sans-serif" font-size="16">Full name</text>
  <rect x="66" y="564" width="408" height="56" rx="18" fill="white" stroke="#D9E3EA"/>

  <text x="66" y="650" fill="#596B79" font-family="Arial, sans-serif" font-size="16">Email</text>
  <rect x="66" y="666" width="408" height="56" rx="18" fill="white" stroke="#D9E3EA"/>

  <text x="66" y="752" fill="#596B79" font-family="Arial, sans-serif" font-size="16">Password</text>
  <rect x="66" y="768" width="408" height="56" rx="18" fill="white" stroke="#D9E3EA"/>

  <rect x="66" y="850" width="408" height="58" rx="20" fill="#FF7B57"/>
  <text x="190" y="886" fill="white" font-family="Arial, sans-serif" font-size="19" font-weight="700">Create account</text>

