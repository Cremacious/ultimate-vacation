      <stop stop-color="#FFF0D8"/>
      <stop offset="0.45" stop-color="#CFEFFF"/>
      <stop offset="1" stop-color="#FFD7C3"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(252 156) rotate(38) scale(312 192)">
      <stop stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1162 214) rotate(122) scale(250 160)">
      <stop stop-color="#FF8C66" stop-opacity="0.34"/>
