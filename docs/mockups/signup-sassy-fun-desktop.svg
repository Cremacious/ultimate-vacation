  <text x="822" y="366" fill="#12202F" font-family="Arial, sans-serif" font-size="44" font-weight="700">Be the trip boss.</text>

  <text x="822" y="424" fill="#566879" font-family="Arial, sans-serif" font-size="16">Full name</text>
