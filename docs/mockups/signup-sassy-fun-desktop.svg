  <text x="894" y="864" fill="#213244" font-family="Arial, sans-serif" font-size="18" font-weight="700">Google</text>

  <text x="822" y="924" fill="#5C6C79" font-family="Arial, sans-serif" font-size="14">No weird setup. Start free, upgrade when the</text>
  <text x="822" y="946" fill="#5C6C79" font-family="Arial, sans-serif" font-size="14">trip starts getting ambitious.</text>
