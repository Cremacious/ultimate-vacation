  <text x="366" y="338" fill="white" font-family="Arial, sans-serif" font-size="56" font-weight="700">Herd the cats.</text>
  <text x="366" y="398" fill="white" font-family="Arial, sans-serif" font-size="56" font-weight="700">Save the vacation.</text>

  <text x="366" y="460" fill="#D8EAF1" font-family="Arial, sans-serif" font-size="22">Trips are fun.</text>
  <text x="366" y="492" fill="#D8EAF1" font-family="Arial, sans-serif" font-size="22">Trip planning is usually nonsense.</text>
  <text x="366" y="524" fill="#D8EAF1" font-family="Arial, sans-serif" font-size="22">This app fixes that part.</text>

  <rect x="366" y="582" width="330" height="132" rx="28" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.16"/>
  <text x="394" y="614" fill="#A8DAE8" font-family="Arial, sans-serif" font-size="12" letter-spacing="2.8">WHY PEOPLE KEEP IT OPEN</text>
  <text x="394" y="650" fill="white" font-family="Arial, sans-serif" font-size="19">• Travel-day checklists that actually save you</text>
  <text x="394" y="684" fill="white" font-family="Arial, sans-serif" font-size="19">• Group votes without the group-chat spiral</text>
  <text x="394" y="718" fill="white" font-family="Arial, sans-serif" font-size="19">• Packing help for the gloriously distracted</text>

